<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floryx</title>

    <link href="https://fonts.googleapis.com/css2?family=Jacques+Francois&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inria+Serif&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <header>

        <div class="wrap">

            <div class="logo">Floryx</div>

            <nav class="nav">
                <a href="../../index.html">MAIN</a>
                <a href="../pages/shop_Bouquets.html">SHOP</a>
                <a href="../pages/about.html">ABOUT</a>
                <a href="../pages/contacts.html">CONTACTS</a>
            </nav>

        </div>

    </header>

    <section class="catalog">

        <div class="wrap">

            <h1>CHECK OUT</h1>

            <div class="filter">

             <a href="../pages/shop_Bouquets.html">Bouquets</a>
                <a href="../pages/shop_Rose.html"  >Rose</a>
                <a href="../pages/shop_Tulip.html" style="font-weight: 700;" >Tulip</a>
                <a href="../pages/shop_Peony.html">Peony</a>
                <a href="../pages/shop_Lily.html">Lily</a>
                <a href="../pages/shop_Orchid.html">Orchid</a>
                <a href="../pages/shop_Chrysanthemum.html">Chrysanthemum</a>

            </div>


                <button class="btn-back"><a href="../pages/shop_Tulip.html">←</a></button>
            <div class="line"></div>

            
    <section class="checkout-card">

        <div class="product-section">
            <img src="../image/tulip/5.png" alt="Bouquet">

            <div class="product-info">
                <div>
                    <p>Name</p>
                    <h2>GOLDEN HOUR</h2>
                </div>

                <div>
                    <p>Price</p>
                    <h2>65 $</h2>
                </div>
            </div>

            <div class="payment-info">
                <div class="input-group card-number">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9012 3456">
                </div>

                <div class="input-group cvv">
                    <label>CVV</label>
                    <input type="text" placeholder="123">
                </div>

                <div class="input-group expiry">
                    <label>Expiration Date</label>
                    <input type="text" placeholder="MM / YY">
                </div>
            </div>
        </div>

        <form class="customer-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name">
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="+1 (000) 000-0000">
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="example@email.com">
            </div>

            <div class="input-group">
                <label>Delivery Address</label>
                <input type="text" placeholder="Street, City, ZIP Code">
            </div>

            <button class="btn-card" style="height: 50px; width: 90px; margin:auto; text-align: center;">
                <a href="../pages/shop_Tulip.html">BUY</a>
            </button>
        </form>

    </section>

            </div>
        </section>

    <footer>
        <div class="wrap foot">

            <div class="footer-left">
                <div class="logo">Floryx</div>

                <div class="social">
                    <a href="https://www.facebook.com/">
                        <img src="../image/facebook.png" alt="Facebook">
                    </a>
                    <a href="https://www.instagram.com/">
                        <img src="../image/instagram.png" alt="Instagram">
                    </a>
                    <a href="https://x.com/">
                        <img src="../image/twitter.png" alt="Twitter">
                    </a>
                </div>
            </div>

            <div class="menu">
                <a href="../../index.html">MAIN</a>
                <a href="../pages/shop_Bouquets.html">SHOP</a>
                <a href="../pages/about.html">ABOUT</a>
                <a href="../pages/contacts.html">CONTACTS</a>
            </div>

            <form class="form">
                <input type="email" placeholder="Enter your Email">
                <button type="submit">SEND US</button>
            </form>

        </div>
    </footer>


    
</body>
</html>
